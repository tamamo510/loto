<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLEF v5.0 - Gravity Loto Engine Framework</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--surface:#111827;--card:#1f2937;--border:#374151;--primary:#6366f1;--accent:#8b5cf6;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--text:#e5e7eb;--text-dim:#9ca3af;--hot:#ef4444;--warm:#f97316;--mid:#eab308;--cool:#3b82f6;--cold:#6366f1}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1400px;margin:0 auto;padding:16px}
h1{font-size:1.5rem;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;padding:12px 0}
h2{font-size:1.1rem;color:var(--accent);margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:6px}
h3{font-size:0.95rem;color:var(--primary);margin-bottom:8px}
.subtitle{text-align:center;color:var(--text-dim);font-size:0.8rem;margin-bottom:16px}
.controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center}
.btn{padding:8px 16px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:0.85rem;transition:all .2s;background:var(--card);color:var(--text)}
.btn:hover{border-color:var(--primary)}
.btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.btn.run{background:linear-gradient(135deg,var(--primary),var(--accent));border:none;color:#fff;font-weight:bold;padding:10px 24px}
.btn.run:hover{opacity:0.9}
.file-input{display:none}
.file-label{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--card);border:1px dashed var(--border);border-radius:6px;cursor:pointer;font-size:0.85rem;color:var(--text)}
.file-label:hover{border-color:var(--primary)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px}
.card.highlight{border-color:var(--primary);box-shadow:0 0 12px rgba(99,102,241,0.2)}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:0.7rem;font-weight:bold}
.tag.hot{background:rgba(239,68,68,0.2);color:var(--hot)}
.tag.warm{background:rgba(249,115,22,0.2);color:var(--warm)}
.tag.mid{background:rgba(234,179,8,0.2);color:var(--mid)}
.tag.cool{background:rgba(59,130,246,0.2);color:var(--cool)}

.num-ball{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;font-weight:bold;font-size:0.85rem;margin:2px}
.num-ball.selected{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 0 8px rgba(99,102,241,0.4)}

.heat-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;border-radius:4px;font-size:0.75rem;min-height:44px;cursor:pointer;transition:transform .15s}
.heat-cell:hover{transform:scale(1.15);z-index:1}

.heat-cell .score{font-size:0.6rem;opacity:0.8}
.bar{height:18px;border-radius:3px;transition:width .5s;min-width:2px}
.prediction-box{background:linear-gradient(135deg,rgba(99,102,241,0.1),rgba(139,92,246,0.1));border:2px solid var(--primary);border-radius:12px;padding:20px;text-align:center;margin:12px 0}
.prediction-nums{display:flex;justify-content:center;gap:8px;margin:12px 0;flex-wrap:wrap}

.osaka-box{background:linear-gradient(135deg,rgba(236,72,153,0.1),rgba(244,114,182,0.1));border:2px solid #ec4899;border-radius:12px;padding:20px;margin:12px 0}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(55,65,81,0.5);font-size:0.85rem}
.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--text-dim)}
.stat-value{font-weight:bold}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:4px 0}
.progress-fill{height:100%;border-radius:3px;transition:width .5s}
.tab-bar{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto}
.tab{padding:6px 14px;border:1px solid var(--border);border-radius:6px 6px 0 0;cursor:pointer;font-size:0.8rem;white-space:nowrap;background:var(--surface);color:var(--text-dim)}
.tab.active{background:var(--card);color:var(--primary);border-bottom-color:var(--card)}
.wave-chart{display:flex;align-items:flex-end;gap:2px;height:120px;padding:8px 0}
.wave-bar{flex:1;border-radius:2px 2px 0 0;transition:height .5s;min-width:6px;position:relative}
.wave-bar:hover::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:2px 6px;border-radius:3px;font-size:0.65rem;white-space:nowrap}
.matrix-grid{display:grid;gap:1px;font-size:0.5rem}
.matrix-cell{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:1px;font-size:0.45rem}
.confidence-meter{width:100%;height:24px;background:var(--border);border-radius:12px;overflow:hidden;position:relative}
.confidence-fill{height:100%;border-radius:12px;transition:width .8s}
.confidence-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.75rem;font-weight:bold;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.5)}
.status{padding:8px 12px;border-radius:6px;font-size:0.8rem;margin-bottom:8px}
.status.info{background:rgba(99,102,241,0.1);border:1px solid var(--primary);color:var(--primary)}
.status.success{background:rgba(16,185,129,0.1);border:1px solid var(--success);color:var(--success)}
.status.error{background:rgba(239,68,68,0.1);border:1px solid var(--danger);color:var(--danger)}
.kill-badge{display:inline-block;padding:2px 8px;background:rgba(239,68,68,0.2);color:var(--danger);border-radius:4px;font-size:0.7rem;font-weight:bold}
.pass-badge{display:inline-block;padding:2px 8px;background:rgba(16,185,129,0.2);color:var(--success);border-radius:4px;font-size:0.7rem;font-weight:bold}
table{width:100%;border-collapse:collapse;font-size:0.8rem}
th{background:rgba(99,102,241,0.1);padding:6px 8px;text-align:left;color:var(--primary);font-weight:600}
td{padding:5px 8px;border-bottom:1px solid rgba(55,65,81,0.3)}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text-dim)}
.loading::after{content:'';width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-left:12px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){.grid2,.grid3{grid-template-columns:1fr}.controls{flex-direction:column}.heatmap{font-size:0.65rem}}
</style>
</head>
<body>
<div class="app" id="app">
  <h1>GLEF v5.0 - Gravity Loto Engine Framework</h1>
  <p class="subtitle">4D Wave Physics + Statistical Analysis + Osaka Round Prediction</p>

  <div class="controls">
    <label class="file-label">
      CSV Upload
      <input type="file" class="file-input" id="csvInput" accept=".csv">
    </label>
    <span id="fileName" style="color:var(--text-dim);font-size:0.8rem">No file</span>
    <button class="btn active" id="btnLoto6" onclick="setGame('loto6')">Loto6</button>
    <button class="btn" id="btnLoto7" onclick="setGame('loto7')">Loto7</button>
    <button class="btn run" onclick="runAnalysis()">4D Wave Analysis</button>
  </div>
  <div id="statusArea"></div>
  <div id="results"></div>
</div>

<script>
// ===== OSAKA ROUNDS DATA (from PDF) =====
const OSAKA_ROUNDS_LOTO6 = [
  336,353,372,404,424,455,466,475,497,505,526,537,557,558,573,574,615,616,
  634,635,660,661,676,677,716,717,736,737,764,765,780,781,816,817,839,840,
  865,866,881,882,921,922,944,945,968,969,984,985,1024,1025,1049,1050,1071,
  1072,1089,1090,1127,1128,1152,1153,1186,1187,1194,1195,1228,1229,1249,1250,
  1297,1298,1329,1330,1351,1352,1399,1400,1419,1420,1421,1422,1449,1450,1523,
  1524,1636,1637,1705,1706,1721,1722,1768,1769,1808,1809,1842,1843,1867,1868,
  1916,1937,1938,1970,1971,2012,2013,2040,2041
];

// ===== GAME CONFIG =====
const CONFIG = {
  loto6: {
    maxNum: 43, pickCount: 6, bonusCount: 1,
    zones: {A:[1,10],B:[11,21],C:[22,32],D:[33,43]},
    meanSum: 132, sumRange: [90, 185],
    renbanKill: 4, consecutiveFilter: 3,
    label: 'Loto6'
  },
  loto7: {
    maxNum: 37, pickCount: 7, bonusCount: 2,
    zones: {A:[1,10],B:[11,19],C:[20,28],D:[29,37]},
    meanSum: 133, sumRange: [100, 200],
    renbanKill: 5, consecutiveFilter: 3,
    label: 'Loto7'
  }
};

// Weighted average coefficients (fixed per spec)
const W_LONG = 0.5, W_MID = 0.3, W_SHORT = 0.2;

let gameType = 'loto6';
let csvText = null;

function setGame(type) {
  gameType = type;
  document.getElementById('btnLoto6').className = type === 'loto6' ? 'btn active' : 'btn';
  document.getElementById('btnLoto7').className = type === 'loto7' ? 'btn active' : 'btn';
}

document.getElementById('csvInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('fileName').textContent = file.name;
  const reader = new FileReader();
  reader.onload = ev => { csvText = ev.target.result; };
  reader.readAsText(file, 'Shift_JIS');
});

// ===== CSV PARSER =====
function parseCSV(text) {
  const cfg = CONFIG[gameType];
  const lines = text.split('\n').filter(l => l.trim());
  const draws = [];
  for (let i = 1; i < lines.length; i++) {
    const cells = lines[i].split(',');
    if (cells.length < 8) continue;
    const round = parseInt(cells[0]);
    const dateStr = cells[1]?.trim();
    if (isNaN(round) || !dateStr) continue;

    const nums = [];
    const numCols = gameType === 'loto7' ? 7 : 6;
    for (let j = 2; j < 2 + numCols; j++) {
      const n = parseInt(cells[j]);
      if (!isNaN(n) && n >= 1) nums.push(n);
    }
    if (nums.length < numCols) continue;
    nums.sort((a, b) => a - b);

    const bonuses = [];
    const bonusStart = 2 + numCols;
    for (let j = bonusStart; j < bonusStart + cfg.bonusCount; j++) {
      const b = parseInt(cells[j]);
      if (!isNaN(b)) bonuses.push(b);
    }

    // Carryover - find last numeric column
    let carryover = 0;
    const coIdx = cells.length - 1;
    const coVal = parseInt(cells[coIdx]);
    if (!isNaN(coVal)) carryover = coVal;

    const sum = nums.reduce((a, b) => a + b, 0);
    const oddCount = nums.filter(n => n % 2 === 1).length;

    // Day of week
    let dayOfWeek = '';
    try {
      const parts = dateStr.split('/');
      if (parts.length === 3) {
        const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
        dayOfWeek = d.getDay();
      }
    } catch(e) {}

    draws.push({ round, date: dateStr, numbers: nums, bonuses, carryover, sum, oddCount, evenCount: numCols - oddCount, dayOfWeek });
  }
  return draws.sort((a, b) => a.round - b.round);
}

// ===== GET ZONE =====
function getZone(num) {
  const z = CONFIG[gameType].zones;
  for (const [name, [lo, hi]] of Object.entries(z)) {
    if (num >= lo && num <= hi) return name;
  }
  return 'D';
}

function getZoneCounts(nums) {
  const c = {A:0,B:0,C:0,D:0};
  nums.forEach(n => c[getZone(n)]++);
  return c;
}

// ===== 4D WAVE PHYSICS ENGINE =====

// 1st Dimension: Depth Wave
function calcDepthWave(num, draws) {
  const all = draws, mid = draws.slice(-100), short = draws.slice(-20);

  function gapScore(data) {
    let gap = data.length;
    for (let i = data.length - 1; i >= 0; i--) {
      if (data[i].numbers.includes(num)) { gap = data.length - 1 - i; break; }
    }
    if (gap <= 2) return 30.0;
    if (gap <= 9) return 5.0;
    if (gap <= 20) return 5.0 + (5.0 - Math.abs(gap - 15)) * 1.5;
    if (gap >= 25) return -5.0;
    return 3.0;
  }

  return gapScore(all) * W_LONG + gapScore(mid) * W_MID + gapScore(short) * W_SHORT;
}

// 2nd Dimension: Vertical Wave (temporal sync)
function calcVerticalWave(num, draws) {
  let score = 0;
  const n = draws.length;
  if (n < 3) return 0;

  // Short-term sync (t-1, t-2, t-3)
  const t1 = draws[n-1]?.numbers || [];
  const t2 = draws[n-2]?.numbers || [];
  const t3 = draws[n-3]?.numbers || [];

  let shortScore = 0;
  if (t2.includes(num)) shortScore += 25.0;
  if (t3.includes(num)) shortScore += 20.0;
  // t-1 repeat only if momentum
  if (t1.includes(num)) {
    const last10 = draws.slice(-10);
    const freq = last10.filter(d => d.numbers.includes(num)).length;
    if (freq >= 2) shortScore += 15.0;
  }

  // Mid-term sync (gap 10-50)
  let midScore = 0;
  const midDraws = draws.slice(-50);
  for (let g = 10; g <= Math.min(50, midDraws.length); g++) {
    const idx = midDraws.length - g;
    if (idx >= 0 && midDraws[idx].numbers.includes(num)) {
      midScore += Math.max(0, 15.0 - (g - 10) * 0.3);
    }
  }
  midScore = Math.min(midScore, 20.0);

  // Long-term sync (gap 100+)
  let longScore = 0;
  for (let g = 100; g <= Math.min(200, draws.length); g += 10) {
    const idx = draws.length - g;
    if (idx >= 0 && draws[idx].numbers.includes(num)) {
      longScore += 5.0;
    }
  }
  longScore = Math.min(longScore, 15.0);

  return shortScore * W_SHORT + midScore * W_MID + longScore * W_LONG;
}

// 3rd Dimension: Horizontal Wave (zone MACD)
function calcHorizontalWave(num, draws) {
  const zone = getZone(num);
  const zoneNums = [];
  const cfg = CONFIG[gameType];
  const [lo, hi] = cfg.zones[zone];

  // Calculate zone presence per draw
  const presence = draws.map(d => {
    let count = 0;
    d.numbers.forEach(n => { if (n >= lo && n <= hi) count++; });
    return count;
  });

  function macd(data, shortW, longW) {
    if (data.length < longW) return 0;
    const shortMA = data.slice(-shortW).reduce((a,b)=>a+b,0) / shortW;
    const longMA = data.slice(-longW).reduce((a,b)=>a+b,0) / longW;
    return shortMA - longMA;
  }

  const shortMACD = macd(presence, 20, 50);
  const midMACD = macd(presence, 50, 100);
  const longMACD = presence.length > 200 ? macd(presence, 100, 200) : midMACD;

  let shortScore = 0;
  if (shortMACD > 0.2) shortScore = 10.0;
  else if (shortMACD < -0.2) shortScore = -5.0;

  let midS = 0;
  if (midMACD > 0.2) midS = 8.0;
  else if (midMACD < -0.2) midS = -3.0;

  let longS = 0;
  if (longMACD > 0.1) longS = 5.0;
  else if (longMACD < -0.1) longS = -2.0;

  // Long-term override: if short falling but long rising, bonus
  let bonus = 0;
  if (shortMACD < -0.2 && longMACD > 0.1) bonus = 5.0;

  return shortScore * W_SHORT + midS * W_MID + longS * W_LONG + bonus;
}

// 4th Dimension: Cross Wave (interaction matrix)
function buildInteractionMatrix(draws) {
  const cfg = CONFIG[gameType];
  const maxNum = cfg.maxNum;
  const matrix = Array.from({length: maxNum + 1}, () => new Float32Array(maxNum + 1));

  // Full data for macro filter
  const fullCount = Array.from({length: maxNum + 1}, () => new Float32Array(maxNum + 1));
  draws.forEach(d => {
    for (let i = 0; i < d.numbers.length; i++) {
      for (let j = i + 1; j < d.numbers.length; j++) {
        fullCount[d.numbers[i]][d.numbers[j]]++;
        fullCount[d.numbers[j]][d.numbers[i]]++;
      }
    }
  });

  // Normalize
  const maxVal = Math.max(1, ...fullCount.flatMap(row => [...row]));
  for (let i = 1; i <= maxNum; i++) {
    for (let j = 1; j <= maxNum; j++) {
      matrix[i][j] = fullCount[i][j] / maxVal;
    }
  }
  return matrix;
}

function calcCrossWave(num, topCandidates, matrix) {
  let score = 0;
  topCandidates.forEach(top => {
    if (top !== num && matrix[top] && matrix[top][num] >= 0.3) {
      score += matrix[top][num] * 10.0;
    }
  });
  // Consecutive penalty
  if (matrix[num]) {
    const prev = num > 1 ? matrix[num][num-1] : 0;
    const next = num < CONFIG[gameType].maxNum ? matrix[num][num+1] : 0;
    if (prev > 0.5 || next > 0.5) score -= 20.0;
  }
  return Math.max(score, -10);
}

// ===== CO BIAS =====
function calcCOBias(num, draws) {
  const highCO = draws.filter(d => d.carryover >= 500000000);
  const normal = draws.filter(d => d.carryover < 500000000);
  if (highCO.length < 5 || normal.length < 5) return 0;

  const coRate = highCO.filter(d => d.numbers.includes(num)).length / highCO.length;
  const normalRate = normal.filter(d => d.numbers.includes(num)).length / normal.length;
  const deviation = coRate - normalRate;
  return deviation * 5.0;
}

// ===== DYNAMIC TREND =====
function calcTrend(draws) {
  const cfg = CONFIG[gameType];
  const n = draws.length;
  if (n < 3) return { oddTarget: Math.floor(cfg.pickCount / 2), sumTarget: cfg.meanSum };

  // Odd/even MA (multi-layer)
  const ma3 = draws.slice(-3).reduce((s,d) => s + d.oddCount, 0) / 3;
  const ma20 = draws.slice(-20).reduce((s,d) => s + d.oddCount, 0) / Math.min(20, n);
  const maAll = draws.reduce((s,d) => s + d.oddCount, 0) / n;
  const weightedMA = ma3 * W_SHORT + ma20 * W_MID + maAll * W_LONG;

  let oddTarget;
  if (gameType === 'loto6') {
    if (weightedMA >= 3.5) oddTarget = 4;
    else if (weightedMA <= 2.5) oddTarget = 2;
    else oddTarget = 3;
  } else {
    if (weightedMA >= 4.0) oddTarget = 5;
    else if (weightedMA <= 3.0) oddTarget = 3;
    else oddTarget = 4;
  }

  // Sum rebound
  const lastSum = draws[n-1].sum;
  const avgSum = draws.slice(-20).reduce((s,d) => s + d.sum, 0) / Math.min(20, n);
  const longAvg = draws.reduce((s,d) => s + d.sum, 0) / n;
  const wAvg = avgSum * 0.3 + longAvg * 0.7;
  let sumTarget = Math.round(wAvg);
  if (lastSum < wAvg - 20) sumTarget = Math.round(wAvg + 10);
  else if (lastSum > wAvg + 20) sumTarget = Math.round(wAvg - 10);

  return { oddTarget, sumTarget, weightedMA, lastSum, avgSum: wAvg };
}

// ===== KILL SWITCHES =====
function killCheck(nums) {
  const cfg = CONFIG[gameType];
  const sorted = [...nums].sort((a,b) => a - b);
  const reasons = [];

  // Consecutive check
  let maxStreak = 1, streak = 1;
  for (let i = 1; i < sorted.length; i++) {
    if (sorted[i] - sorted[i-1] === 1) { streak++; maxStreak = Math.max(maxStreak, streak); }
    else streak = 1;
  }
  if (maxStreak >= cfg.renbanKill) reasons.push(`${maxStreak}renban`);
  if (maxStreak >= cfg.consecutiveFilter) reasons.push(`${maxStreak}consecutive`);

  // Sum check
  const sum = sorted.reduce((a,b) => a + b, 0);
  if (sum < cfg.sumRange[0] || sum > cfg.sumRange[1]) reasons.push(`sum=${sum}`);

  // Zone concentration
  const zc = getZoneCounts(sorted);
  if (Object.values(zc).some(v => v >= 5)) reasons.push('zone5+');

  // All odd/even
  const odds = sorted.filter(n => n % 2 === 1).length;
  if (odds === 0 || odds === sorted.length) reasons.push('all-odd/even');

  return reasons;
}

// ===== STATISTICAL ANALYSIS (from v8, no core numbers) =====
function performStats(draws) {
  const cfg = CONFIG[gameType];
  const maxNum = cfg.maxNum;

  const overallCount = {};
  const recent50 = {}, recent100 = {};
  const missCount = {};
  for (let i = 1; i <= maxNum; i++) { overallCount[i]=0; recent50[i]=0; recent100[i]=0; missCount[i]=draws.length; }

  draws.forEach(d => d.numbers.forEach(n => { if(n<=maxNum) overallCount[n]++; }));
  draws.slice(-50).forEach(d => d.numbers.forEach(n => { if(n<=maxNum) recent50[n]++; }));
  draws.slice(-100).forEach(d => d.numbers.forEach(n => { if(n<=maxNum) recent100[n]++; }));

  for (let i = 1; i <= maxNum; i++) {
    for (let j = draws.length - 1; j >= 0; j--) {
      if (draws[j].numbers.includes(i)) { missCount[i] = draws.length - 1 - j; break; }
    }
  }

  // Pair co-occurrence
  const pairCount = {};
  draws.forEach(d => {
    for (let i = 0; i < d.numbers.length; i++) {
      for (let j = i + 1; j < d.numbers.length; j++) {
        const k = `${d.numbers[i]},${d.numbers[j]}`;
        pairCount[k] = (pairCount[k]||0) + 1;
      }
    }
  });

  // Carry/slide rates
  let carryN = 0, slideN = 0;
  for (let i = 1; i < draws.length; i++) {
    if (draws[i-1].numbers.some(n => draws[i].numbers.includes(n))) carryN++;
    if (draws[i-1].numbers.some(p => draws[i].numbers.some(c => Math.abs(p-c)===1))) slideN++;
  }

  // Hot/cold
  const hot50 = Object.entries(recent50).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([n,c])=>[+n,c]);
  const cold50 = Object.entries(recent50).sort((a,b)=>a[1]-b[1]).slice(0,10).map(([n,c])=>[+n,c]);
  const hot100 = Object.entries(recent100).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([n,c])=>[+n,c]);

  // Top pairs
  const pairsTop5 = Object.entries(pairCount).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([p,c])=>{
    const [a,b]=p.split(',').map(Number); return [[a,b],c];
  });

  // Odd/even patterns
  const oePatterns = {};
  draws.forEach(d => { const k=`${d.oddCount}:${d.evenCount}`; oePatterns[k]=(oePatterns[k]||0)+1; });
  const oeTop = Object.entries(oePatterns).sort((a,b)=>b[1]-a[1]).slice(0,3);

  // Sum stats
  const sums = draws.map(d=>d.sum);
  const sumMean = sums.reduce((a,b)=>a+b,0)/sums.length;

  // Zone counts
  const zoneTotals = {A:0,B:0,C:0,D:0};
  draws.forEach(d => d.numbers.forEach(n => zoneTotals[getZone(n)]++));

  // Weekday analysis (loto6 only)
  let weekday = null;
  if (gameType === 'loto6') {
    const monDraws = draws.filter(d => d.dayOfWeek === 1);
    const thuDraws = draws.filter(d => d.dayOfWeek === 4);
    const analyzeDay = (data) => {
      const cnt = {};
      for(let i=1;i<=maxNum;i++) cnt[i]=0;
      data.forEach(d=>d.numbers.forEach(n=>{if(n<=maxNum)cnt[n]++;}));
      return Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([n,c])=>[+n,c]);
    };
    weekday = { monday: analyzeDay(monDraws), thursday: analyzeDay(thuDraws), monCount: monDraws.length, thuCount: thuDraws.length };
  }

  return {
    overallCount, recent50, recent100, missCount,
    hot50, cold50, hot100, pairsTop5,
    carryRate: ((carryN/(draws.length-1))*100).toFixed(1),
    slideRate: ((slideN/(draws.length-1))*100).toFixed(1),
    oeTop, sumMean: sumMean.toFixed(1), sumMin: Math.min(...sums), sumMax: Math.max(...sums),
    zoneTotals, weekday, totalDraws: draws.length
  };
}

// ===== OSAKA ROUND ANALYSIS =====
function analyzeOsaka(draws) {
  if (gameType !== 'loto6') return null;
  const cfg = CONFIG[gameType];
  const maxNum = cfg.maxNum;

  const osakaDraws = draws.filter(d => OSAKA_ROUNDS_LOTO6.includes(d.round));
  const nonOsakaDraws = draws.filter(d => !OSAKA_ROUNDS_LOTO6.includes(d.round));

  if (osakaDraws.length < 5) return null;

  // Number frequency in Osaka vs non-Osaka
  const osakaCount = {}, nonOsakaCount = {};
  for(let i=1;i<=maxNum;i++){osakaCount[i]=0;nonOsakaCount[i]=0;}
  osakaDraws.forEach(d=>d.numbers.forEach(n=>{if(n<=maxNum)osakaCount[n]++;}));
  nonOsakaDraws.forEach(d=>d.numbers.forEach(n=>{if(n<=maxNum)nonOsakaCount[n]++;}));

  // Deviation
  const deviation = {};
  for (let i = 1; i <= maxNum; i++) {
    const osakaRate = osakaCount[i] / osakaDraws.length;
    const nonRate = nonOsakaCount[i] / Math.max(1, nonOsakaDraws.length);
    deviation[i] = osakaRate - nonRate;
  }

  // Top Osaka-biased numbers
  const osakaFavorites = Object.entries(deviation)
    .sort((a,b) => b[1] - a[1])
    .slice(0, 15)
    .map(([n, dev]) => ({num: +n, dev, count: osakaCount[+n], rate: (osakaCount[+n]/osakaDraws.length*100).toFixed(1)}));

  // Osaka sum stats
  const osakaSums = osakaDraws.map(d => d.sum);
  const osakaSumMean = osakaSums.reduce((a,b)=>a+b,0) / osakaSums.length;

  // Osaka odd/even
  const osakaOddAvg = osakaDraws.reduce((s,d)=>s+d.oddCount,0) / osakaDraws.length;

  // Recent osaka rounds
  const recentOsaka = osakaDraws.slice(-5);

  // Next osaka round prediction
  const nextOsakaRound = predictNextOsaka(draws);

  return {
    totalOsaka: osakaDraws.length,
    osakaFavorites,
    osakaSumMean: osakaSumMean.toFixed(1),
    osakaOddAvg: osakaOddAvg.toFixed(2),
    recentOsaka,
    deviation,
    nextOsakaRound
  };
}

function predictNextOsaka(draws) {
  // Analyze pattern of osaka round intervals
  const intervals = [];
  for (let i = 1; i < OSAKA_ROUNDS_LOTO6.length; i++) {
    intervals.push(OSAKA_ROUNDS_LOTO6[i] - OSAKA_ROUNDS_LOTO6[i-1]);
  }
  // Recent intervals tend to be pairs, so look at pair gaps
  const pairGaps = [];
  for (let i = 0; i < OSAKA_ROUNDS_LOTO6.length - 1; i += 2) {
    if (i + 2 < OSAKA_ROUNDS_LOTO6.length) {
      pairGaps.push(OSAKA_ROUNDS_LOTO6[i+2] - OSAKA_ROUNDS_LOTO6[i]);
    }
  }
  const lastRound = OSAKA_ROUNDS_LOTO6[OSAKA_ROUNDS_LOTO6.length - 1];
  const avgPairGap = pairGaps.length > 0 ? Math.round(pairGaps.slice(-10).reduce((a,b)=>a+b,0) / Math.min(10, pairGaps.length)) : 30;

  return { lastRound, avgPairGap, estimatedNext: lastRound + avgPairGap };
}

// ===== MAIN ANALYSIS =====
function runAnalysis() {
  if (!csvText) { showStatus('CSVファイルをアップロードしてください', 'error'); return; }
  showStatus('4D Wave Physics Analysis...', 'info');

  setTimeout(() => {
    try {
      const draws = parseCSV(csvText);
      if (draws.length < 10) throw new Error('Data insufficient');

      const cfg = CONFIG[gameType];
      const maxNum = cfg.maxNum;

      // 1. Statistical analysis
      const stats = performStats(draws);

      // 2. Build interaction matrix
      const matrix = buildInteractionMatrix(draws);

      // 3. Calculate 4D gravity scores
      const scores = [];
      // First pass for top candidates (for cross wave)
      const preScores = [];
      for (let i = 1; i <= maxNum; i++) {
        const depth = calcDepthWave(i, draws);
        const vertical = calcVerticalWave(i, draws);
        const horizontal = calcHorizontalWave(i, draws);
        preScores.push({num: i, score: depth + vertical + horizontal});
      }
      preScores.sort((a,b) => b.score - a.score);
      const topCandidates = preScores.slice(0, 10).map(s => s.num);

      for (let i = 1; i <= maxNum; i++) {
        const depth = calcDepthWave(i, draws);
        const vertical = calcVerticalWave(i, draws);
        const horizontal = calcHorizontalWave(i, draws);
        const cross = calcCrossWave(i, topCandidates, matrix);
        const co = calcCOBias(i, draws);
        const total = depth + vertical + horizontal + cross + co;
        scores.push({num: i, total, depth, vertical, horizontal, cross, co});
      }
      scores.sort((a,b) => b.total - a.total);

      // 4. Top 18 candidates (ensure zone coverage)
      const top18 = selectTop18(scores);

      // 5. Dynamic trend
      const trend = calcTrend(draws);

      // 6. Generate & kill -> final prediction
      const prediction = generatePrediction(top18, trend, cfg);

      // 7. Osaka analysis
      const osaka = analyzeOsaka(draws);

      // 8. Osaka prediction (if applicable)
      let osakaPrediction = null;
      if (osaka) {
        osakaPrediction = generateOsakaPrediction(scores, osaka, trend, cfg);
      }

      // 9. Confidence
      const topScore = scores[0].total;
      const avgScore = scores.reduce((s,sc) => s + sc.total, 0) / scores.length;
      const confidence = Math.min(100, Math.max(0, Math.round((topScore - avgScore) / Math.max(1, topScore) * 200)));

      renderResults({scores, top18, stats, trend, prediction, osaka, osakaPrediction, confidence, draws, matrix});
      showStatus(`Analysis complete - ${draws.length} draws processed`, 'success');
    } catch(e) {
      showStatus('Error: ' + e.message, 'error');
      console.error(e);
    }
  }, 50);
}

function selectTop18(scores) {
  const cfg = CONFIG[gameType];
  const selected = [];
  const zoneHas = {A:false,B:false,C:false,D:false};

  // First ensure each zone has at least 1
  for (const zone of ['A','B','C','D']) {
    const best = scores.find(s => getZone(s.num) === zone && !selected.includes(s));
    if (best) { selected.push(best); zoneHas[zone] = true; }
  }

  // Fill remaining from top scores
  for (const s of scores) {
    if (selected.length >= 18) break;
    if (!selected.find(x => x.num === s.num)) selected.push(s);
  }

  return selected;
}

function generatePrediction(top18, trend, cfg) {
  const nums = top18.map(s => s.num);
  const pickCount = cfg.pickCount;

  let bestCombo = null, bestScore = -Infinity;

  // Greedy + refinement approach
  // Start with top picks
  const initial = top18.slice(0, pickCount).map(s => s.num);
  const killReasons = killCheck(initial);

  if (killReasons.length === 0) {
    bestCombo = initial;
    bestScore = top18.slice(0, pickCount).reduce((s, sc) => s + sc.total, 0);
  }

  // Try variations
  for (let attempt = 0; attempt < 500; attempt++) {
    const combo = [];
    const pool = [...nums];

    // Pick with trend awareness
    while (combo.length < pickCount && pool.length > 0) {
      const oddNow = combo.filter(n => n % 2 === 1).length;
      const evenNow = combo.length - oddNow;
      const remaining = pickCount - combo.length;

      let idx;
      if (oddNow < trend.oddTarget && remaining <= (trend.oddTarget - oddNow)) {
        // Need more odds
        idx = pool.findIndex(n => n % 2 === 1);
      } else if (evenNow < (pickCount - trend.oddTarget) && remaining <= (pickCount - trend.oddTarget - evenNow)) {
        idx = pool.findIndex(n => n % 2 === 0);
      } else {
        // Random weighted selection from top
        const weights = pool.map((n, i) => Math.max(0.1, 1 - i * 0.05));
        const totalW = weights.reduce((a,b)=>a+b,0);
        let r = Math.random() * totalW;
        idx = 0;
        for (let i = 0; i < weights.length; i++) {
          r -= weights[i];
          if (r <= 0) { idx = i; break; }
        }
      }
      if (idx === -1) idx = 0;
      combo.push(pool.splice(idx, 1)[0]);
    }

    const kr = killCheck(combo);
    if (kr.length > 0) continue;

    const comboScore = combo.reduce((s, n) => {
      const sc = top18.find(x => x.num === n);
      return s + (sc ? sc.total : 0);
    }, 0);

    // Sum proximity bonus
    const sum = combo.reduce((a,b) => a+b, 0);
    const sumBonus = -Math.abs(sum - trend.sumTarget) * 0.5;

    const finalScore = comboScore + sumBonus;
    if (finalScore > bestScore) {
      bestScore = finalScore;
      bestCombo = combo;
    }
  }

  if (!bestCombo) bestCombo = top18.slice(0, pickCount).map(s => s.num);
  bestCombo.sort((a,b) => a - b);

  const kr = killCheck(bestCombo);
  return {
    numbers: bestCombo,
    score: bestScore,
    sum: bestCombo.reduce((a,b)=>a+b,0),
    oddEven: [bestCombo.filter(n=>n%2===1).length, bestCombo.filter(n=>n%2===0).length],
    zones: getZoneCounts(bestCombo),
    killReasons: kr,
    passed: kr.length === 0
  };
}

function generateOsakaPrediction(allScores, osaka, trend, cfg) {
  // Boost scores for Osaka-biased numbers
  const adjusted = allScores.map(s => {
    const dev = osaka.deviation[s.num] || 0;
    const osakaBonus = dev > 0 ? dev * 15.0 : dev * 3.0;
    return {...s, osakaTotal: s.total + osakaBonus, osakaBonus};
  });
  adjusted.sort((a,b) => b.osakaTotal - a.osakaTotal);

  const top18 = [];
  const zoneHas = {A:false,B:false,C:false,D:false};
  for (const zone of ['A','B','C','D']) {
    const best = adjusted.find(s => getZone(s.num) === zone && !top18.includes(s));
    if (best) top18.push(best);
  }
  for (const s of adjusted) {
    if (top18.length >= 18) break;
    if (!top18.find(x => x.num === s.num)) top18.push(s);
  }

  const nums = top18.map(s => s.num);
  const pickCount = cfg.pickCount;
  let bestCombo = null, bestScore = -Infinity;

  for (let attempt = 0; attempt < 500; attempt++) {
    const combo = [];
    const pool = [...nums];
    while (combo.length < pickCount && pool.length > 0) {
      const weights = pool.map((n,i) => Math.max(0.1, 1 - i*0.05));
      const totalW = weights.reduce((a,b)=>a+b,0);
      let r = Math.random() * totalW, idx = 0;
      for (let i = 0; i < weights.length; i++) { r -= weights[i]; if(r<=0){idx=i;break;} }
      combo.push(pool.splice(idx,1)[0]);
    }
    const kr = killCheck(combo);
    if (kr.length > 0) continue;
    const score = combo.reduce((s,n) => {
      const sc = top18.find(x=>x.num===n);
      return s + (sc ? sc.osakaTotal : 0);
    }, 0);
    if (score > bestScore) { bestScore = score; bestCombo = combo; }
  }

  if (!bestCombo) bestCombo = top18.slice(0, pickCount).map(s=>s.num);
  bestCombo.sort((a,b)=>a-b);

  return {
    numbers: bestCombo,
    score: bestScore,
    sum: bestCombo.reduce((a,b)=>a+b,0),
    oddEven: [bestCombo.filter(n=>n%2===1).length, bestCombo.filter(n=>n%2===0).length],
    zones: getZoneCounts(bestCombo),
    killReasons: killCheck(bestCombo),
    passed: killCheck(bestCombo).length === 0,
    nextEstimate: osaka.nextOsakaRound
  };
}

      <span style="display:flex;align-items:center;gap:4px"><span style="width:16px;height:16px;background:var(--hot);border-radius:2px;display:inline-block"></span>Hot</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:16px;height:16px;background:var(--warm);border-radius:2px;display:inline-block"></span>Warm</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:16px;height:16px;background:var(--mid);border-radius:2px;display:inline-block"></span>Mid</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:16px;height:16px;background:var(--cool);border-radius:2px;display:inline-block"></span>Cool</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:16px;height:16px;background:var(--cold);border-radius:2px;display:inline-block"></span>Cold</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:16px;height:16px;border:2px solid var(--primary);border-radius:2px;display:inline-block"></span>Top18</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:16px;height:16px;border:2px solid #fff;border-radius:2px;display:inline-block;background:var(--primary)"></span>Selected</span>
    </div>
    <div class="heatmap" style="grid-template-columns:repeat(${cols},1fr)">`;

  for (let i = 1; i <= maxNum; i++) {
    const s = scores.find(sc => sc.num === i);
    const norm = (s.total - minScore) / range;
    let bg;
    if (norm > 0.8) bg = 'var(--hot)';
    else if (norm > 0.6) bg = 'var(--warm)';
    else if (norm > 0.4) bg = 'var(--mid)';
    else if (norm > 0.2) bg = 'var(--cool)';
    else bg = 'var(--cold)';

    const isTop18 = top18nums.includes(i);
    const isPred = predNums.includes(i);
    const border = isPred ? '2px solid #fff' : isTop18 ? '2px solid var(--primary)' : '1px solid transparent';

    html += `<div class="heat-cell" style="background:${bg};border:${border}" title="No.${i} Score:${s.total.toFixed(1)}">
      <span class="num">${i}</span>
      <span class="score">${s.total.toFixed(1)}</span>
    </div>`;
  }
  html += `</div></div>`;
  return html;
}

function renderWaveComposition(prediction, scores) {
  let html = `<div class="card"><h2>Wave Composition - Selected Numbers</h2>`;
  const predScores = prediction.numbers.map(n => scores.find(s=>s.num===n));

  // Stacked bar chart
  const components = ['depth','vertical','horizontal','cross','co'];
  const colors = {'depth':'#ef4444','vertical':'#f97316','horizontal':'#eab308','cross':'#3b82f6','co':'#8b5cf6'};
  const labels = {'depth':'Depth','vertical':'Vertical','horizontal':'Horizontal','cross':'Cross','co':'CO Bias'};

  html += `<div style="display:flex;gap:4px;margin-bottom:8px;font-size:0.7rem">
    ${components.map(c=>`<span style="display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;background:${colors[c]};border-radius:2px;display:inline-block"></span>${labels[c]}</span>`).join(' ')}
  </div>`;

  predScores.forEach(s => {
    if (!s) return;
    const maxAbs = Math.max(1, ...components.map(c => Math.abs(s[c])));
    const totalPos = components.reduce((sum,c) => sum + Math.max(0, s[c]), 0);

    html += `<div style="margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
        <span style="font-weight:bold;width:24px;text-align:right">${s.num}</span>
        <span style="font-size:0.75rem;color:var(--text-dim)">Total: ${s.total.toFixed(1)}</span>
      </div>
      <div style="display:flex;height:20px;border-radius:3px;overflow:hidden;background:var(--border)">`;

    components.forEach(c => {
      const val = Math.max(0, s[c]);
      const pct = totalPos > 0 ? (val / totalPos * 100) : 0;
      if (pct > 0) {
        html += `<div style="width:${pct}%;background:${colors[c]};position:relative" title="${labels[c]}: ${s[c].toFixed(1)}"></div>`;
      }
    });
    html += `</div></div>`;
  });

  html += `</div>`;

  // Detailed breakdown table
  html += `<div class="card"><h3>Score Breakdown</h3><table><thead><tr><th>Num</th><th>Depth</th><th>Vertical</th><th>Horizontal</th><th>Cross</th><th>CO</th><th>Total</th></tr></thead><tbody>`;
  predScores.forEach(s => {
    if (!s) return;
    html += `<tr><td><b>${s.num}</b></td><td>${s.depth.toFixed(1)}</td><td>${s.vertical.toFixed(1)}</td><td>${s.horizontal.toFixed(1)}</td><td>${s.cross.toFixed(1)}</td><td>${s.co.toFixed(2)}</td><td><b>${s.total.toFixed(1)}</b></td></tr>`;
  });
  html += `</tbody></table></div>`;

  return html;
}

function renderMatrix(matrix, prediction) {
  const cfg = CONFIG[gameType];
  const maxNum = cfg.maxNum;
  const predNums = prediction.numbers;

  let html = `<div class="card"><h2>Interaction Matrix Heatmap</h2>
    <p style="font-size:0.75rem;color:var(--text-dim);margin-bottom:8px">${maxNum}x${maxNum} co-occurrence matrix. Selected numbers highlighted.</p>
    <div style="overflow-x:auto">
    <div class="matrix-grid" style="grid-template-columns:24px repeat(${maxNum},1fr);max-width:${maxNum*14+24}px">`;

  // Header row
  html += `<div></div>`;
  for (let j = 1; j <= maxNum; j++) {
    const isPred = predNums.includes(j);
    html += `<div style="text-align:center;font-size:0.45rem;font-weight:${isPred?'bold':'normal'};color:${isPred?'var(--primary)':'var(--text-dim)'}">${j}</div>`;
  }

  for (let i = 1; i <= maxNum; i++) {
    const isPredI = predNums.includes(i);
    html += `<div style="font-size:0.5rem;display:flex;align-items:center;justify-content:flex-end;padding-right:2px;font-weight:${isPredI?'bold':'normal'};color:${isPredI?'var(--primary)':'var(--text-dim)'}">${i}</div>`;
    for (let j = 1; j <= maxNum; j++) {
      const val = matrix[i]?.[j] || 0;
      const intensity = Math.min(1, val * 2);
      const r = Math.round(99 + intensity * 156);
      const g = Math.round(102 + (1-intensity) * 50);
      const b = Math.round(241 - intensity * 100);
      const both = predNums.includes(i) && predNums.includes(j);
      html += `<div class="matrix-cell" style="background:rgba(${r},${g},${b},${0.1+intensity*0.8});${both?'border:1px solid #fff':''}" title="${i}-${j}: ${val.toFixed(3)}"></div>`;
    }
  }
  html += `</div></div></div>`;
  return html;
}

function renderStats(stats, draws) {
  let html = `<div class="grid2">`;

  // Basic stats
  html += `<div class="card"><h3>Basic Statistics</h3>
    <div class="stat-row"><span class="stat-label">Total Draws</span><span class="stat-value">${stats.totalDraws}</span></div>
    <div class="stat-row"><span class="stat-label">Carry Rate</span><span class="stat-value">${stats.carryRate}%</span></div>
    <div class="stat-row"><span class="stat-label">Slide Rate</span><span class="stat-value">${stats.slideRate}%</span></div>
    <div class="stat-row"><span class="stat-label">Sum Avg</span><span class="stat-value">${stats.sumMean}</span></div>
    <div class="stat-row"><span class="stat-label">Sum Range</span><span class="stat-value">${stats.sumMin} - ${stats.sumMax}</span></div>
  </div>`;

  // Odd/even patterns
  html += `<div class="card"><h3>Odd:Even Top Patterns</h3>`;
  stats.oeTop.forEach(([pat, cnt]) => {
    const pct = (cnt / stats.totalDraws * 100).toFixed(1);
    html += `<div class="stat-row"><span class="stat-label">${pat}</span><span class="stat-value">${cnt} (${pct}%)</span></div>`;
  });
  html += `</div>`;

  // Hot 50
  html += `<div class="card"><h3>Hot Numbers (Last 50)</h3>
    <div style="display:flex;flex-wrap:wrap;gap:4px">`;
  stats.hot50.forEach(([n,c]) => {
    html += `<span class="tag hot">${n} (${c})</span>`;
  });
  html += `</div></div>`;

  // Cold 50
  html += `<div class="card"><h3>Cold Numbers (Last 50)</h3>
    <div style="display:flex;flex-wrap:wrap;gap:4px">`;
  stats.cold50.forEach(([n,c]) => {
    html += `<span class="tag cold">${n} (${c})</span>`;
  });
  html += `</div></div>`;

  // Hot 100
  html += `<div class="card"><h3>Hot Numbers (Last 100)</h3>
    <div style="display:flex;flex-wrap:wrap;gap:4px">`;
  stats.hot100.forEach(([n,c]) => {
    html += `<span class="tag warm">${n} (${c})</span>`;
  });
  html += `</div></div>`;

  // Top pairs
  html += `<div class="card"><h3>Top Co-occurrence Pairs</h3>`;
  stats.pairsTop5.forEach(([[a,b], cnt]) => {
    html += `<div class="stat-row"><span class="stat-label">${a} - ${b}</span><span class="stat-value">${cnt}</span></div>`;
  });
  html += `</div>`;

  // Zone distribution
  html += `<div class="card"><h3>Zone Distribution</h3>`;
  const totalZone = Object.values(stats.zoneTotals).reduce((a,b)=>a+b,0);
  Object.entries(stats.zoneTotals).forEach(([z, cnt]) => {
    const pct = (cnt / totalZone * 100).toFixed(1);
    html += `<div style="margin-bottom:6px">
      <div class="stat-row"><span class="stat-label">Zone ${z}</span><span class="stat-value">${cnt} (${pct}%)</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:var(--primary)"></div></div>
    </div>`;
  });
  html += `</div>`;

  // Weekday (loto6 only)
  if (stats.weekday) {
    html += `<div class="card"><h3>Weekday Analysis (Loto6)</h3>
      <div class="grid2">
        <div><h3>Monday (${stats.weekday.monCount} draws)</h3>
          <div style="display:flex;flex-wrap:wrap;gap:3px">${stats.weekday.monday.map(([n,c])=>`<span class="tag mid">${n}(${c})</span>`).join('')}</div>
        </div>
        <div><h3>Thursday (${stats.weekday.thuCount} draws)</h3>
          <div style="display:flex;flex-wrap:wrap;gap:3px">${stats.weekday.thursday.map(([n,c])=>`<span class="tag mid">${n}(${c})</span>`).join('')}</div>
        </div>
      </div>
    </div>`;
  }

  html += `</div>`;

  // Miss ranking (top 15)
  const missRank = Object.entries(stats.missCount).sort((a,b)=>b[1]-a[1]).slice(0,15);
  html += `<div class="card"><h3>Most Missed Numbers (Recovery Candidates)</h3>
    <div class="wave-chart">`;
  const maxMiss = Math.max(...missRank.map(([,c])=>c));
  missRank.forEach(([n, cnt]) => {
    const h = Math.max(5, (cnt / maxMiss) * 100);
    html += `<div class="wave-bar" style="height:${h}%;background:linear-gradient(to top,var(--cool),var(--cold))" data-tip="${n}: ${cnt} draws"><span style="font-size:0.6rem;position:absolute;bottom:-16px;left:50%;transform:translateX(-50%)">${n}</span></div>`;
  });
  html += `</div></div>`;

  return html;
}

function renderCOBias(scores) {
  let html = `<div class="card"><h2>Carryover Bias Distribution</h2>
    <p style="font-size:0.75rem;color:var(--text-dim);margin-bottom:8px">CO deviation for each number (positive = appears more during high CO)</p>
    <div class="wave-chart" style="height:150px;align-items:center">`;

  const cfg = CONFIG[gameType];
  const maxCO = Math.max(...scores.map(s => Math.abs(s.co)));

  for (let i = 1; i <= cfg.maxNum; i++) {
    const s = scores.find(sc => sc.num === i);
    const val = s.co;
    const h = maxCO > 0 ? Math.abs(val) / maxCO * 60 : 0;
    const isPos = val >= 0;
    const color = isPos ? 'var(--success)' : 'var(--danger)';

    html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:center;position:relative">
      <div style="height:${isPos?h:0}%;width:80%;background:${isPos?color:'transparent'};border-radius:2px 2px 0 0;min-height:${isPos&&h>0?'2px':'0'}"></div>
      <div style="width:100%;height:1px;background:var(--border)"></div>
      <div style="height:${!isPos?h:0}%;width:80%;background:${!isPos?color:'transparent'};border-radius:0 0 2px 2px;min-height:${!isPos&&h>0?'2px':'0'}"></div>
      <span style="font-size:0.5rem;color:var(--text-dim);position:absolute;bottom:-14px">${i}</span>
    </div>`;
  }

  html += `</div></div>`;

  // Top CO biased numbers
  const sorted = [...scores].sort((a,b) => b.co - a.co);
  html += `<div class="grid2">
    <div class="card"><h3>CO Positive Bias (appear more in high CO)</h3>`;
  sorted.slice(0, 10).forEach(s => {
    html += `<div class="stat-row"><span class="stat-label">No.${s.num}</span><span class="stat-value" style="color:var(--success)">${s.co >= 0 ? '+' : ''}${s.co.toFixed(3)}</span></div>`;
  });
  html += `</div><div class="card"><h3>CO Negative Bias (appear less in high CO)</h3>`;
  sorted.slice(-10).reverse().forEach(s => {
    html += `<div class="stat-row"><span class="stat-label">No.${s.num}</span><span class="stat-value" style="color:var(--danger)">${s.co.toFixed(3)}</span></div>`;
  });
  html += `</div></div>`;

  return html;
}
</script>
