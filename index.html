<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLEF v5.0 - Gravity Loto Engine Framework</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--surface:#111827;--card:#1f2937;--border:#374151;--primary:#6366f1;--accent:#8b5cf6;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--text:#e5e7eb;--text-dim:#9ca3af;--hot:#ef4444;--warm:#f97316;--mid:#eab308;--cool:#3b82f6;--cold:#6366f1}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1400px;margin:0 auto;padding:12px}
h1{font-size:1.4rem;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;padding:10px 0}
h2{font-size:1.05rem;color:var(--accent);margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:4px}
h3{font-size:0.9rem;color:var(--primary);margin-bottom:6px}
.sub{text-align:center;color:var(--text-dim);font-size:0.75rem;margin-bottom:12px}
.controls{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center}
.btn{padding:7px 14px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:0.8rem;transition:all .2s;background:var(--card);color:var(--text)}
.btn:hover{border-color:var(--primary)}
.btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.btn.run{background:linear-gradient(135deg,var(--primary),var(--accent));border:none;color:#fff;font-weight:bold;padding:9px 20px}
.btn.sm{padding:4px 10px;font-size:0.7rem}
.file-label{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;background:var(--card);border:1px dashed var(--border);border-radius:6px;cursor:pointer;font-size:0.8rem;color:var(--text)}
input[type=file]{display:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
.tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:0.65rem;font-weight:bold}
.tag.hot{background:rgba(239,68,68,.2);color:var(--hot)}
.tag.warm{background:rgba(249,115,22,.2);color:var(--warm)}
.tag.cool{background:rgba(59,130,246,.2);color:var(--cool)}
.tag.cold{background:rgba(99,102,241,.2);color:var(--cold)}
.tag.osaka{background:rgba(236,72,153,.2);color:#ec4899}
.tag.ok{background:rgba(16,185,129,.2);color:var(--success)}
.tag.ng{background:rgba(239,68,68,.2);color:var(--danger)}
.num-ball{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;font-weight:bold;font-size:0.85rem;margin:2px}
.num-ball.sel{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;box-shadow:0 0 8px rgba(99,102,241,.4)}
.num-ball.osaka{background:linear-gradient(135deg,#ec4899,#f472b6);color:#fff}
.num-ball.hit{background:var(--success);color:#fff}
.num-ball.miss{background:var(--border);color:var(--text-dim)}
.prediction-box{background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(139,92,246,.08));border:2px solid var(--primary);border-radius:10px;padding:16px;text-align:center;margin:10px 0}
.osaka-box{background:linear-gradient(135deg,rgba(236,72,153,.08),rgba(244,114,182,.08));border:2px solid #ec4899;border-radius:10px;padding:16px;margin:10px 0}
.prediction-nums{display:flex;justify-content:center;gap:6px;margin:10px 0;flex-wrap:wrap}
.prediction-nums .num-ball{width:46px;height:46px;font-size:1.05rem}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(55,65,81,.4);font-size:0.8rem}
.stat-row:last-child{border-bottom:none}
.stat-label{color:var(--text-dim)}
.stat-value{font-weight:bold}
.bar-h{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:3px 0}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
.tab-bar{display:flex;gap:3px;margin-bottom:10px;overflow-x:auto}
.tab{padding:5px 12px;border:1px solid var(--border);border-radius:6px 6px 0 0;cursor:pointer;font-size:0.75rem;white-space:nowrap;background:var(--surface);color:var(--text-dim)}
.tab.active{background:var(--card);color:var(--primary);border-bottom-color:var(--card)}
.wave-chart{display:flex;align-items:flex-end;gap:2px;height:110px;padding:6px 0}
.wave-bar{flex:1;border-radius:2px 2px 0 0;min-width:5px;position:relative}
.heatmap{display:grid;gap:3px}
.heat-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px;border-radius:3px;font-size:0.7rem;min-height:40px;cursor:pointer;transition:transform .15s}
.heat-cell:hover{transform:scale(1.12);z-index:1}
.heat-cell .num{font-weight:bold;font-size:0.85rem}
.heat-cell .sc{font-size:0.55rem;opacity:.8}
.conf-meter{width:100%;height:22px;background:var(--border);border-radius:11px;overflow:hidden;position:relative}
.conf-fill{height:100%;border-radius:11px;transition:width .7s}
.conf-lbl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.7rem;font-weight:bold;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.status{padding:6px 10px;border-radius:5px;font-size:0.75rem;margin-bottom:6px}
.status.info{background:rgba(99,102,241,.1);border:1px solid var(--primary);color:var(--primary)}
.status.ok{background:rgba(16,185,129,.1);border:1px solid var(--success);color:var(--success)}
.status.err{background:rgba(239,68,68,.1);border:1px solid var(--danger);color:var(--danger)}
table{width:100%;border-collapse:collapse;font-size:0.75rem}
th{background:rgba(99,102,241,.1);padding:5px 6px;text-align:left;color:var(--primary);font-weight:600}
td{padding:4px 6px;border-bottom:1px solid rgba(55,65,81,.3)}
.bt-row{display:flex;gap:4px;align-items:center;padding:3px 0;font-size:0.75rem;border-bottom:1px solid rgba(55,65,81,.3)}
.bt-match{color:var(--success);font-weight:bold}
.bt-miss{color:var(--text-dim)}
.matrix-grid{display:grid;gap:1px;font-size:.45rem}
.matrix-cell{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:1px}
textarea{width:100%;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px;font-size:0.8rem;font-family:monospace;resize:vertical}
@media(max-width:768px){.grid2,.grid3{grid-template-columns:1fr}.controls{flex-direction:column}}
</style>
</head>
<body>
<div class="app">
  <h1>GLEF v5.0 - Gravity Loto Engine Framework</h1>
  <p class="sub">4D Wave Physics + Statistical Analysis + Osaka Round + Backtesting</p>

  <div class="controls">
    <button class="btn active" id="bL6" onclick="setGame('loto6')">Loto6 (<span id="cntL6">0</span>)</button>
    <button class="btn" id="bL7" onclick="setGame('loto7')">Loto7 (<span id="cntL7">0</span>)</button>
    <button class="btn run" onclick="runAnalysis()">4D Wave Analysis</button>
    <label class="file-label" onclick="this.querySelector('input').value=''">
      + Add Latest Result
      <input type="file" id="csvAdd" accept=".csv,.CSV" onchange="addCSV(this)">
    </label>
    <span id="dataInfo" style="color:var(--text-dim);font-size:0.7rem"></span>
  </div>
  <div id="statusArea"></div>
  <div id="results"></div>
</div>

<script src="data.js"></script>
<script>
// ===== OSAKA ROUNDS =====
const OSAKA_LOTO6=[336,353,372,404,424,455,466,475,497,505,526,537,557,558,573,574,615,616,634,635,660,661,676,677,716,717,736,737,764,765,780,781,816,817,839,840,865,866,881,882,921,922,944,945,968,969,984,985,1024,1025,1049,1050,1071,1072,1089,1090,1127,1128,1152,1153,1186,1187,1194,1195,1228,1229,1249,1250,1297,1298,1329,1330,1351,1352,1399,1400,1419,1420,1421,1422,1449,1450,1523,1524,1636,1637,1705,1706,1721,1722,1768,1769,1808,1809,1842,1843,1867,1868,1916,1937,1938,1970,1971,2012,2013,2040,2041];

// ===== CONFIG =====
const CFG={
  loto6:{max:43,pick:6,bCnt:1,zones:{A:[1,10],B:[11,21],C:[22,32],D:[33,43]},mean:132,sumR:[90,185],renKill:4,conFilt:3,label:'Loto6'},
  loto7:{max:37,pick:7,bCnt:2,zones:{A:[1,10],B:[11,19],C:[20,28],D:[29,37]},mean:133,sumR:[100,200],renKill:5,conFilt:3,label:'Loto7'}
};
const WL=0.5,WM=0.3,WS=0.2;

let gameType='loto6';
// Live data arrays - start with embedded data, user can append
let liveData6=[], liveData7=[];
// Prediction history for backtesting
let predHistory=JSON.parse(localStorage.getItem('glef_pred_history')||'{}');
// Learned parameter adjustments from backtesting
let learnedParams=JSON.parse(localStorage.getItem('glef_learned')||'{"depthMult":1,"vertMult":1,"horzMult":1,"crossMult":1,"coMult":1}');

function initData(){
  liveData6=(typeof LOTO6_DATA!=='undefined'?LOTO6_DATA:[]).map(r=>({round:r[0],date:r[1],numbers:[...r[2]].sort((a,b)=>a-b),bonuses:Array.isArray(r[3])?r[3]:[r[3]],co:r[4]}));
  liveData7=(typeof LOTO7_DATA!=='undefined'?LOTO7_DATA:[]).map(r=>({round:r[0],date:r[1],numbers:[...r[2]].sort((a,b)=>a-b),bonuses:Array.isArray(r[3])?r[3]:[r[3]],co:r[4]}));
  enrichDraws(liveData6,'loto6');
  enrichDraws(liveData7,'loto7');
  updCounts();
}
function enrichDraws(draws,type){
  draws.forEach(d=>{
    d.sum=d.numbers.reduce((a,b)=>a+b,0);
    d.odd=d.numbers.filter(n=>n%2===1).length;
    d.even=d.numbers.length-d.odd;
    d.isOsaka=type==='loto6'&&OSAKA_LOTO6.includes(d.round);
    try{const p=d.date.split('/');d.dow=new Date(+p[0],+p[1]-1,+p[2]).getDay();}catch(e){d.dow=-1;}
  });
}
function getDraws(){return gameType==='loto6'?liveData6:liveData7;}
function updCounts(){
  document.getElementById('cntL6').textContent=liveData6.length;
  document.getElementById('cntL7').textContent=liveData7.length;
  const d=getDraws();
  if(d.length) document.getElementById('dataInfo').textContent=`Last: Round ${d[d.length-1].round} (${d[d.length-1].date})`;
}
function setGame(t){
  gameType=t;
  document.getElementById('bL6').className=t==='loto6'?'btn active':'btn';
  document.getElementById('bL7').className=t==='loto7'?'btn active':'btn';
  updCounts();
}

// ===== ADD CSV (append new results) =====
function addCSV(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const text=e.target.result;
    const lines=text.split('\n').filter(l=>l.trim());
    if(lines.length<2){showSt('No valid data','err');return;}
    // Detect type from column count
    const cols=lines[1].split(',');
    const isL7=cols.length>=23;
    const type=isL7?'loto7':'loto6';
    if(type!==gameType) setGame(type);
    const existing=type==='loto6'?liveData6:liveData7;
    const lastRound=existing.length?existing[existing.length-1].round:0;
    let added=0;
    for(let i=1;i<lines.length;i++){
      const c=lines[i].split(',');
      if(c.length<8) continue;
      const round=parseInt(c[0]); if(isNaN(round)||round<=lastRound) continue;
      const date=c[1]?.trim();
      const numCount=isL7?7:6;
      const nums=[];
      for(let j=2;j<2+numCount;j++){const n=parseInt(c[j]);if(!isNaN(n)&&n>=1)nums.push(n);}
      if(nums.length<numCount) continue;
      nums.sort((a,b)=>a-b);
      const bonuses=[];
      const bStart=2+numCount;
      for(let j=bStart;j<bStart+(isL7?2:1);j++){const b=parseInt(c[j]);if(!isNaN(b))bonuses.push(b);}
      let co=parseInt(c[c.length-1])||0;
      const d={round,date,numbers:nums,bonuses,co};
      existing.push(d);
      added++;
    }
    enrichDraws(existing,type);
    updCounts();
    // Check backtesting after adding new data
    checkPredictions(existing,type);
    showSt(`Added ${added} new draws to ${CFG[type].label}. Total: ${existing.length}`,'ok');
  };
  reader.readAsText(file,'Shift_JIS');
}

// ===== BACKTEST: check past predictions against actual results =====
function checkPredictions(draws,type){
  const key=type;
  if(!predHistory[key]) return;
  let updated=false;
  for(const [round,pred] of Object.entries(predHistory[key])){
    if(pred.checked) continue;
    const actual=draws.find(d=>d.round===parseInt(round));
    if(!actual) continue;
    const hits=pred.numbers.filter(n=>actual.numbers.includes(n));
    const bonusHits=pred.numbers.filter(n=>actual.bonuses.includes(n));
    pred.actual=actual.numbers;
    pred.hits=hits;
    pred.bonusHits=bonusHits;
    pred.hitCount=hits.length;
    pred.checked=true;
    updated=true;
  }
  if(updated){
    localStorage.setItem('glef_pred_history',JSON.stringify(predHistory));
    autoTuneParams(type);
  }
}

// ===== AUTO-TUNE: adjust wave weights based on backtest results =====
function autoTuneParams(type){
  const key=type;
  if(!predHistory[key]) return;
  const checked=Object.values(predHistory[key]).filter(p=>p.checked&&p.waveScores);
  if(checked.length<3) return;
  // For each wave component, see which ones contributed most to hits vs misses
  const components=['depth','vertical','horizontal','cross','co'];
  const hitAvg={}, missAvg={};
  components.forEach(c=>{hitAvg[c]=0;missAvg[c]=0;});
  let hitN=0,missN=0;
  checked.forEach(pred=>{
    pred.numbers.forEach(n=>{
      const ws=pred.waveScores?.[n];
      if(!ws) return;
      if(pred.hits.includes(n)){
        components.forEach(c=>{hitAvg[c]+=ws[c]||0;});
        hitN++;
      } else {
        components.forEach(c=>{missAvg[c]+=ws[c]||0;});
        missN++;
      }
    });
  });
  if(hitN===0||missN===0) return;
  components.forEach(c=>{hitAvg[c]/=hitN; missAvg[c]/=missN;});
  // Boost components that had higher scores for hits
  const paramMap={depth:'depthMult',vertical:'vertMult',horizontal:'horzMult',cross:'crossMult',co:'coMult'};
  components.forEach(c=>{
    const diff=hitAvg[c]-missAvg[c];
    const key2=paramMap[c];
    if(diff>0) learnedParams[key2]=Math.min(1.5, learnedParams[key2]+0.02);
    else if(diff<0) learnedParams[key2]=Math.max(0.5, learnedParams[key2]-0.02);
  });
  localStorage.setItem('glef_learned',JSON.stringify(learnedParams));
}

// ===== ZONE / UTIL =====
function zone(n){const z=CFG[gameType].zones;for(const[k,[lo,hi]] of Object.entries(z)){if(n>=lo&&n<=hi)return k;}return'D';}
function zoneCnt(nums){const c={A:0,B:0,C:0,D:0};nums.forEach(n=>c[zone(n)]++);return c;}
function showSt(m,t){document.getElementById('statusArea').innerHTML=`<div class="status ${t}">${m}</div>`;}

// ===== 4D WAVE ENGINE =====
function depthWave(num,draws){
  const fn=data=>{let g=data.length;for(let i=data.length-1;i>=0;i--){if(data[i].numbers.includes(num)){g=data.length-1-i;break;}}
    if(g<=2)return 30;if(g<=9)return 5;if(g<=20)return 5+(5-Math.abs(g-15))*1.5;if(g>=25)return-5;return 3;};
  return(fn(draws)*WL+fn(draws.slice(-100))*WM+fn(draws.slice(-20))*WS)*learnedParams.depthMult;
}
function vertWave(num,draws){
  const n=draws.length;if(n<3)return 0;
  const t1=draws[n-1]?.numbers||[],t2=draws[n-2]?.numbers||[],t3=draws[n-3]?.numbers||[];
  let ss=0;if(t2.includes(num))ss+=25;if(t3.includes(num))ss+=20;
  if(t1.includes(num)){const f=draws.slice(-10).filter(d=>d.numbers.includes(num)).length;if(f>=2)ss+=15;}
  let ms=0;const md=draws.slice(-50);for(let g=10;g<=Math.min(50,md.length);g++){const i=md.length-g;if(i>=0&&md[i].numbers.includes(num))ms+=Math.max(0,15-(g-10)*.3);}
  ms=Math.min(ms,20);
  let ls=0;for(let g=100;g<=Math.min(200,draws.length);g+=10){const i=draws.length-g;if(i>=0&&draws[i].numbers.includes(num))ls+=5;}
  ls=Math.min(ls,15);
  return(ss*WS+ms*WM+ls*WL)*learnedParams.vertMult;
}
function horzWave(num,draws){
  const z=zone(num);const[lo,hi]=CFG[gameType].zones[z];
  const pr=draws.map(d=>{let c=0;d.numbers.forEach(n=>{if(n>=lo&&n<=hi)c++;});return c;});
  const macd=(d,s,l)=>{if(d.length<l)return 0;return d.slice(-s).reduce((a,b)=>a+b,0)/s-d.slice(-l).reduce((a,b)=>a+b,0)/l;};
  const sm=macd(pr,20,50),mm=macd(pr,50,100),lm=pr.length>200?macd(pr,100,200):mm;
  let ss=sm>.2?10:sm<-.2?-5:0, ms=mm>.2?8:mm<-.2?-3:0, ls=lm>.1?5:lm<-.1?-2:0;
  let bonus=sm<-.2&&lm>.1?5:0;
  return(ss*WS+ms*WM+ls*WL+bonus)*learnedParams.horzMult;
}
function buildMatrix(draws){
  const mx=CFG[gameType].max;const m=Array.from({length:mx+1},()=>new Float32Array(mx+1));
  draws.forEach(d=>{for(let i=0;i<d.numbers.length;i++)for(let j=i+1;j<d.numbers.length;j++){m[d.numbers[i]][d.numbers[j]]++;m[d.numbers[j]][d.numbers[i]]++;}});
  const mv=Math.max(1,...m.flatMap(r=>[...r]));
  for(let i=1;i<=mx;i++)for(let j=1;j<=mx;j++)m[i][j]/=mv;
  return m;
}
function crossWave(num,tops,mat){
  let s=0;tops.forEach(t=>{if(t!==num&&mat[t]&&mat[t][num]>=.3)s+=mat[t][num]*10;});
  if(mat[num]){const p=num>1?mat[num][num-1]:0,nx=num<CFG[gameType].max?mat[num][num+1]:0;if(p>.5||nx>.5)s-=20;}
  return Math.max(s,-10)*learnedParams.crossMult;
}
function coBias(num,draws){
  const hi=draws.filter(d=>d.co>=5e8),no=draws.filter(d=>d.co<5e8);
  if(hi.length<5||no.length<5)return 0;
  return(hi.filter(d=>d.numbers.includes(num)).length/hi.length-no.filter(d=>d.numbers.includes(num)).length/no.length)*5*learnedParams.coMult;
}
function calcTrend(draws){
  const c=CFG[gameType],n=draws.length;if(n<3)return{oddT:Math.floor(c.pick/2),sumT:c.mean};
  const ma3=draws.slice(-3).reduce((s,d)=>s+d.odd,0)/3;
  const ma20=draws.slice(-20).reduce((s,d)=>s+d.odd,0)/Math.min(20,n);
  const maA=draws.reduce((s,d)=>s+d.odd,0)/n;
  const wma=ma3*WS+ma20*WM+maA*WL;
  let oddT;
  if(gameType==='loto6'){oddT=wma>=3.5?4:wma<=2.5?2:3;}
  else{oddT=wma>=4?5:wma<=3?3:4;}
  const ls=draws[n-1].sum;
  const a20=draws.slice(-20).reduce((s,d)=>s+d.sum,0)/Math.min(20,n);
  const aL=draws.reduce((s,d)=>s+d.sum,0)/n;
  const wa=a20*.3+aL*.7;
  let sumT=Math.round(ls<wa-20?wa+10:ls>wa+20?wa-10:wa);
  return{oddT,sumT,wma,ls,wa};
}
function killCheck(nums){
  const c=CFG[gameType],sorted=[...nums].sort((a,b)=>a-b),reasons=[];
  let mx=1,st=1;for(let i=1;i<sorted.length;i++){if(sorted[i]-sorted[i-1]===1){st++;mx=Math.max(mx,st);}else st=1;}
  if(mx>=c.renKill)reasons.push(`${mx}renban`);
  if(mx>=c.conFilt)reasons.push(`${mx}consec`);
  const sum=sorted.reduce((a,b)=>a+b,0);
  if(sum<c.sumR[0]||sum>c.sumR[1])reasons.push(`sum=${sum}`);
  const zc=zoneCnt(sorted);if(Object.values(zc).some(v=>v>=5))reasons.push('zone5+');
  const od=sorted.filter(n=>n%2===1).length;if(od===0||od===sorted.length)reasons.push('all-odd/even');
  return reasons;
}

// ===== STATS =====
function calcStats(draws){
  const mx=CFG[gameType].max;
  const ov={},r50={},r100={},miss={};
  for(let i=1;i<=mx;i++){ov[i]=0;r50[i]=0;r100[i]=0;miss[i]=draws.length;}
  draws.forEach(d=>d.numbers.forEach(n=>{if(n<=mx)ov[n]++;}));
  draws.slice(-50).forEach(d=>d.numbers.forEach(n=>{if(n<=mx)r50[n]++;}));
  draws.slice(-100).forEach(d=>d.numbers.forEach(n=>{if(n<=mx)r100[n]++;}));
  for(let i=1;i<=mx;i++)for(let j=draws.length-1;j>=0;j--){if(draws[j].numbers.includes(i)){miss[i]=draws.length-1-j;break;}}
  const pairCnt={};
  draws.forEach(d=>{for(let i=0;i<d.numbers.length;i++)for(let j=i+1;j<d.numbers.length;j++){const k=`${d.numbers[i]},${d.numbers[j]}`;pairCnt[k]=(pairCnt[k]||0)+1;}});
  let carry=0,slide=0;
  for(let i=1;i<draws.length;i++){if(draws[i-1].numbers.some(n=>draws[i].numbers.includes(n)))carry++;if(draws[i-1].numbers.some(p=>draws[i].numbers.some(c=>Math.abs(p-c)===1)))slide++;}
  const hot50=Object.entries(r50).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([n,c])=>[+n,c]);
  const cold50=Object.entries(r50).sort((a,b)=>a[1]-b[1]).slice(0,10).map(([n,c])=>[+n,c]);
  const hot100=Object.entries(r100).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([n,c])=>[+n,c]);
  const topPairs=Object.entries(pairCnt).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([p,c])=>{const[a,b]=p.split(',').map(Number);return[[a,b],c];});
  const oePat={};draws.forEach(d=>{const k=`${d.odd}:${d.even}`;oePat[k]=(oePat[k]||0)+1;});
  const oeTop=Object.entries(oePat).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const sums=draws.map(d=>d.sum),sumM=sums.reduce((a,b)=>a+b,0)/sums.length;
  const zt={A:0,B:0,C:0,D:0};draws.forEach(d=>d.numbers.forEach(n=>zt[zone(n)]++));
  let wkday=null;
  if(gameType==='loto6'){
    const an=d=>{const c={};for(let i=1;i<=mx;i++)c[i]=0;d.forEach(dr=>dr.numbers.forEach(n=>{if(n<=mx)c[n]++;}));return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([n,c])=>[+n,c]);};
    const mon=draws.filter(d=>d.dow===1),thu=draws.filter(d=>d.dow===4);
    wkday={monday:an(mon),thursday:an(thu),monN:mon.length,thuN:thu.length};
  }
  return{ov,r50,r100,miss,hot50,cold50,hot100,topPairs,carryR:((carry/(draws.length-1))*100).toFixed(1),slideR:((slide/(draws.length-1))*100).toFixed(1),oeTop,sumM:sumM.toFixed(1),sumMin:Math.min(...sums),sumMax:Math.max(...sums),zt,wkday,total:draws.length};
}

// ===== OSAKA =====
function osakaAnalysis(draws){
  if(gameType!=='loto6')return null;
  const mx=CFG.loto6.max;
  const od=draws.filter(d=>d.isOsaka),nd=draws.filter(d=>!d.isOsaka);
  if(od.length<5)return null;
  const oc={},nc={};for(let i=1;i<=mx;i++){oc[i]=0;nc[i]=0;}
  od.forEach(d=>d.numbers.forEach(n=>{if(n<=mx)oc[n]++;}));
  nd.forEach(d=>d.numbers.forEach(n=>{if(n<=mx)nc[n]++;}));
  const dev={};for(let i=1;i<=mx;i++)dev[i]=oc[i]/od.length-nc[i]/Math.max(1,nd.length);
  const favs=Object.entries(dev).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([n,d])=>({num:+n,dev:d,cnt:oc[+n],rate:(oc[+n]/od.length*100).toFixed(1)}));
  const osums=od.map(d=>d.sum),osmean=osums.reduce((a,b)=>a+b,0)/osums.length;
  const oodd=od.reduce((s,d)=>s+d.odd,0)/od.length;
  // Next osaka estimate
  const ints=[];for(let i=2;i<OSAKA_LOTO6.length;i+=2)if(i+2<=OSAKA_LOTO6.length)ints.push(OSAKA_LOTO6[i]-OSAKA_LOTO6[i-2]);
  const last=OSAKA_LOTO6[OSAKA_LOTO6.length-1];
  const avgG=ints.length?Math.round(ints.slice(-10).reduce((a,b)=>a+b,0)/Math.min(10,ints.length)):30;
  return{total:od.length,favs,dev,osmean:osmean.toFixed(1),oodd:oodd.toFixed(2),recent:od.slice(-5),lastR:last,avgG,estNext:last+avgG};
}

// ===== SELECT TOP18 + PREDICTION =====
function selectTop18(scores){
  const sel=[];
  ['A','B','C','D'].forEach(z=>{const b=scores.find(s=>zone(s.num)===z&&!sel.includes(s));if(b)sel.push(b);});
  scores.forEach(s=>{if(sel.length<18&&!sel.find(x=>x.num===s.num))sel.push(s);});
  return sel;
}
function genPrediction(top18,trend){
  const c=CFG[gameType],nums=top18.map(s=>s.num),pk=c.pick;
  let best=null,bestS=-Infinity;
  for(let a=0;a<500;a++){
    const combo=[],pool=[...nums];
    while(combo.length<pk&&pool.length>0){
      const on=combo.filter(n=>n%2===1).length,en=combo.length-on,rem=pk-combo.length;
      let idx;
      if(on<trend.oddT&&rem<=(trend.oddT-on)){idx=pool.findIndex(n=>n%2===1);}
      else if(en<(pk-trend.oddT)&&rem<=(pk-trend.oddT-en)){idx=pool.findIndex(n=>n%2===0);}
      else{const w=pool.map((_,i)=>Math.max(.1,1-i*.05)),tw=w.reduce((a,b)=>a+b,0);let r=Math.random()*tw;idx=0;for(let i=0;i<w.length;i++){r-=w[i];if(r<=0){idx=i;break;}}}
      if(idx===-1)idx=0;
      combo.push(pool.splice(idx,1)[0]);
    }
    const kr=killCheck(combo);if(kr.length>0)continue;
    const cs=combo.reduce((s,n)=>{const sc=top18.find(x=>x.num===n);return s+(sc?sc.total:0);},0);
    const sb=-Math.abs(combo.reduce((a,b)=>a+b,0)-trend.sumT)*.5;
    if(cs+sb>bestS){bestS=cs+sb;best=combo;}
  }
  if(!best)best=top18.slice(0,pk).map(s=>s.num);
  best.sort((a,b)=>a-b);
  const kr=killCheck(best);
  return{numbers:best,score:bestS,sum:best.reduce((a,b)=>a+b,0),oe:[best.filter(n=>n%2===1).length,best.filter(n=>n%2===0).length],zones:zoneCnt(best),kr,pass:kr.length===0};
}
function genOsakaPred(scores,osaka,trend){
  const c=CFG[gameType];
  const adj=scores.map(s=>{const d=osaka.dev[s.num]||0;const ob=d>0?d*15:d*3;return{...s,ot:s.total+ob,ob};});
  adj.sort((a,b)=>b.ot-a.ot);
  const t18=selectTop18(adj.map(s=>({...s,total:s.ot})));
  const nums=t18.map(s=>s.num),pk=c.pick;
  let best=null,bestS=-Infinity;
  for(let a=0;a<500;a++){
    const combo=[],pool=[...nums];
    while(combo.length<pk&&pool.length>0){const w=pool.map((_,i)=>Math.max(.1,1-i*.05)),tw=w.reduce((a,b)=>a+b,0);let r=Math.random()*tw,idx=0;for(let i=0;i<w.length;i++){r-=w[i];if(r<=0){idx=i;break;}}combo.push(pool.splice(idx,1)[0]);}
    const kr=killCheck(combo);if(kr.length>0)continue;
    const cs=combo.reduce((s,n)=>{const sc=t18.find(x=>x.num===n);return s+(sc?sc.total:0);},0);
    if(cs>bestS){bestS=cs;best=combo;}
  }
  if(!best)best=t18.slice(0,pk).map(s=>s.num);
  best.sort((a,b)=>a-b);
  return{numbers:best,score:bestS,sum:best.reduce((a,b)=>a+b,0),oe:[best.filter(n=>n%2===1).length,best.filter(n=>n%2===0).length],zones:zoneCnt(best),kr:killCheck(best),pass:killCheck(best).length===0,est:{lastR:osaka.lastR,avgG:osaka.avgG,next:osaka.estNext}};
}

// ===== MAIN ANALYSIS =====
function runAnalysis(){
  const draws=getDraws();
  if(draws.length<10){showSt('Data insufficient','err');return;}
  showSt('4D Wave Physics Analysis...','info');
  setTimeout(()=>{
    try{
      const c=CFG[gameType],mx=c.max;
      const stats=calcStats(draws);
      const mat=buildMatrix(draws);
      // First pass for top candidates
      const pre=[];
      for(let i=1;i<=mx;i++){const d=depthWave(i,draws),v=vertWave(i,draws),h=horzWave(i,draws);pre.push({num:i,score:d+v+h});}
      pre.sort((a,b)=>b.score-a.score);
      const tops=pre.slice(0,10).map(s=>s.num);
      const scores=[];
      const waveScores={};
      for(let i=1;i<=mx;i++){
        const d=depthWave(i,draws),v=vertWave(i,draws),h=horzWave(i,draws),cr=crossWave(i,tops,mat),co=coBias(i,draws);
        const total=d+v+h+cr+co;
        scores.push({num:i,total,depth:d,vertical:v,horizontal:h,cross:cr,co});
        waveScores[i]={depth:d,vertical:v,horizontal:h,cross:cr,co};
      }
      scores.sort((a,b)=>b.total-a.total);
      const top18=selectTop18(scores);
      const trend=calcTrend(draws);
      const pred=genPrediction(top18,trend);
      const osaka=osakaAnalysis(draws);
      let oPred=null;if(osaka)oPred=genOsakaPred(scores,osaka,trend);
      const topS=scores[0].total,avgS=scores.reduce((s,sc)=>s+sc.total,0)/scores.length;
      const conf=Math.min(100,Math.max(0,Math.round((topS-avgS)/Math.max(1,topS)*200)));
      // Save prediction for future backtesting
      const nextRound=draws[draws.length-1].round+1;
      if(!predHistory[gameType])predHistory[gameType]={};
      predHistory[gameType][nextRound]={numbers:pred.numbers,waveScores,date:new Date().toISOString(),checked:false};
      localStorage.setItem('glef_pred_history',JSON.stringify(predHistory));
      // Run retrospective backtest
      const btResults=runBacktest(draws,scores);
      renderAll({scores,top18,stats,trend,pred,osaka,oPred,conf,draws,mat,btResults,waveScores});
      showSt(`Analysis complete - ${draws.length} draws, next prediction for Round ${nextRound}`,'ok');
    }catch(e){showSt('Error: '+e.message,'err');console.error(e);}
  },50);
}

// ===== RETROSPECTIVE BACKTEST =====
function runBacktest(draws,currentScores){
  if(draws.length<50)return null;
  const results=[];
  const testRange=Math.min(20,draws.length-30);
  for(let t=1;t<=testRange;t++){
    const idx=draws.length-t;
    const actual=draws[idx];
    const trainData=draws.slice(0,idx);
    if(trainData.length<20)continue;
    // Quick simplified scoring (to avoid full recalc overhead)
    const c=CFG[gameType],mx=c.max;
    const quickScores=[];
    for(let i=1;i<=mx;i++){
      const d=depthWave(i,trainData);
      const v=vertWave(i,trainData);
      quickScores.push({num:i,total:d+v});
    }
    quickScores.sort((a,b)=>b.total-a.total);
    const predicted=quickScores.slice(0,c.pick).map(s=>s.num).sort((a,b)=>a-b);
    const hits=predicted.filter(n=>actual.numbers.includes(n));
    results.push({round:actual.round,date:actual.date,predicted,actual:actual.numbers,hits,hitCount:hits.length});
  }
  // Accuracy stats
  const totalHits=results.reduce((s,r)=>s+r.hitCount,0);
  const totalPoss=results.length*CFG[gameType].pick;
  const avgHit=results.length?totalHits/results.length:0;
  const maxHit=results.length?Math.max(...results.map(r=>r.hitCount)):0;
  return{results:results.reverse(),avgHit:avgHit.toFixed(2),maxHit,hitRate:(totalHits/totalPoss*100).toFixed(1),totalTests:results.length};
}

    <span><span style="display:inline-block;width:12px;height:12px;background:var(--warm);border-radius:2px;vertical-align:middle"></span> Warm</span>
    <span><span style="display:inline-block;width:12px;height:12px;background:var(--cool);border-radius:2px;vertical-align:middle"></span> Cool</span>
    <span><span style="display:inline-block;width:12px;height:12px;border:2px solid var(--primary);border-radius:2px;vertical-align:middle"></span> Top18</span>
    <span><span style="display:inline-block;width:12px;height:12px;background:var(--primary);border-radius:2px;vertical-align:middle"></span> Selected</span></div>
    <div class="heatmap" style="grid-template-columns:repeat(${cols},1fr)">`;
  for(let i=1;i<=mx;i++){
    const s=scores.find(sc=>sc.num===i),norm=(s.total-minS)/rng;
    let bg=norm>.8?'var(--hot)':norm>.6?'var(--warm)':norm>.4?'var(--mid)':norm>.2?'var(--cool)':'var(--cold)';
    const bdr=pn.includes(i)?'2px solid #fff':t18.includes(i)?'2px solid var(--primary)':'1px solid transparent';
    h+=`<div class="heat-cell" style="background:${bg};border:${bdr}" title="No.${i} Score:${s.total.toFixed(1)}"><span class="num">${i}</span><span class="sc">${s.total.toFixed(1)}</span></div>`;
  }
  h+=`</div></div>`;return h;
}

function rWave(pred,scores){
  const ps=pred.numbers.map(n=>scores.find(s=>s.num===n));
  const comps=['depth','vertical','horizontal','cross','co'];
  const cols={depth:'#ef4444',vertical:'#f97316',horizontal:'#eab308',cross:'#3b82f6',co:'#8b5cf6'};
  let h=`<div class="card"><h2>Wave Composition</h2>
    <div style="display:flex;gap:6px;margin-bottom:6px;font-size:.65rem">${comps.map(c=>`<span><span style="display:inline-block;width:8px;height:8px;background:${cols[c]};border-radius:2px;vertical-align:middle"></span> ${c}</span>`).join(' ')}</div>`;
  ps.forEach(s=>{if(!s)return;const tp=comps.reduce((sum,c)=>sum+Math.max(0,s[c]),0);
    h+=`<div style="margin-bottom:6px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><span style="font-weight:bold;width:20px">${s.num}</span><span style="font-size:.7rem;color:var(--text-dim)">${s.total.toFixed(1)}</span></div>
    <div style="display:flex;height:16px;border-radius:3px;overflow:hidden;background:var(--border)">`;
    comps.forEach(c=>{const v=Math.max(0,s[c]),pct=tp>0?v/tp*100:0;if(pct>0)h+=`<div style="width:${pct}%;background:${cols[c]}" title="${c}: ${s[c].toFixed(1)}"></div>`;});
    h+=`</div></div>`;});
  h+=`</div>`;
  h+=`<div class="card"><h3>Score Breakdown</h3><table><thead><tr><th>N</th><th>Dep</th><th>Vert</th><th>Horz</th><th>Cross</th><th>CO</th><th>Total</th></tr></thead><tbody>`;
  ps.forEach(s=>{if(!s)return;h+=`<tr><td><b>${s.num}</b></td><td>${s.depth.toFixed(1)}</td><td>${s.vertical.toFixed(1)}</td><td>${s.horizontal.toFixed(1)}</td><td>${s.cross.toFixed(1)}</td><td>${s.co.toFixed(2)}</td><td><b>${s.total.toFixed(1)}</b></td></tr>`;});
  h+=`</tbody></table></div>`;return h;
}

function rMatrix(mat,pred){
  const mx=CFG[gameType].max,pn=pred.numbers;
  let h=`<div class="card"><h2>Interaction Matrix</h2><div style="overflow-x:auto">
    <div class="matrix-grid" style="grid-template-columns:20px repeat(${mx},1fr);max-width:${mx*12+20}px"><div></div>`;
  for(let j=1;j<=mx;j++){const ip=pn.includes(j);h+=`<div style="text-align:center;font-weight:${ip?'bold':'normal'};color:${ip?'var(--primary)':'var(--text-dim)'}">${j}</div>`;}
  for(let i=1;i<=mx;i++){
    const ip=pn.includes(i);h+=`<div style="font-size:.45rem;display:flex;align-items:center;justify-content:flex-end;padding-right:1px;font-weight:${ip?'bold':'normal'};color:${ip?'var(--primary)':'var(--text-dim)'}">${i}</div>`;
    for(let j=1;j<=mx;j++){const v=mat[i]?.[j]||0,int=Math.min(1,v*2),r=Math.round(99+int*156),g=Math.round(102+(1-int)*50),b=Math.round(241-int*100);
      const both=pn.includes(i)&&pn.includes(j);h+=`<div class="matrix-cell" style="background:rgba(${r},${g},${b},${.1+int*.8});${both?'border:1px solid #fff':''}"></div>`;}}
  h+=`</div></div></div>`;return h;
}

function rStats(st){
  let h=`<div class="grid2">`;
  h+=`<div class="card"><h3>Basic</h3>
    <div class="stat-row"><span class="stat-label">Total</span><span class="stat-value">${st.total}</span></div>
    <div class="stat-row"><span class="stat-label">Carry Rate</span><span class="stat-value">${st.carryR}%</span></div>
    <div class="stat-row"><span class="stat-label">Slide Rate</span><span class="stat-value">${st.slideR}%</span></div>
    <div class="stat-row"><span class="stat-label">Sum Avg</span><span class="stat-value">${st.sumM}</span></div>
    <div class="stat-row"><span class="stat-label">Sum Range</span><span class="stat-value">${st.sumMin}-${st.sumMax}</span></div></div>`;
  h+=`<div class="card"><h3>Odd:Even Patterns</h3>`;
  st.oeTop.forEach(([p,c])=>{h+=`<div class="stat-row"><span class="stat-label">${p}</span><span class="stat-value">${c} (${(c/st.total*100).toFixed(1)}%)</span></div>`;});
  h+=`</div>`;
  h+=`<div class="card"><h3>Hot (50)</h3><div style="display:flex;flex-wrap:wrap;gap:3px">${st.hot50.map(([n,c])=>`<span class="tag hot">${n}(${c})</span>`).join('')}</div></div>`;
  h+=`<div class="card"><h3>Cold (50)</h3><div style="display:flex;flex-wrap:wrap;gap:3px">${st.cold50.map(([n,c])=>`<span class="tag cold">${n}(${c})</span>`).join('')}</div></div>`;
  h+=`<div class="card"><h3>Hot (100)</h3><div style="display:flex;flex-wrap:wrap;gap:3px">${st.hot100.map(([n,c])=>`<span class="tag warm">${n}(${c})</span>`).join('')}</div></div>`;
  h+=`<div class="card"><h3>Top Pairs</h3>`;st.topPairs.forEach(([[a,b],c])=>{h+=`<div class="stat-row"><span class="stat-label">${a}-${b}</span><span class="stat-value">${c}</span></div>`;});h+=`</div>`;
  h+=`<div class="card"><h3>Zone Distribution</h3>`;const zt=Object.values(st.zt).reduce((a,b)=>a+b,0);
  Object.entries(st.zt).forEach(([z,c])=>{const pct=(c/zt*100).toFixed(1);h+=`<div style="margin-bottom:4px"><div class="stat-row"><span class="stat-label">Zone ${z}</span><span class="stat-value">${c} (${pct}%)</span></div><div class="bar-h"><div class="bar-fill" style="width:${pct}%;background:var(--primary)"></div></div></div>`;});h+=`</div>`;
  if(st.wkday){h+=`<div class="card"><h3>Weekday</h3><div class="grid2"><div><h3>Mon(${st.wkday.monN})</h3><div style="display:flex;flex-wrap:wrap;gap:2px">${st.wkday.monday.map(([n,c])=>`<span class="tag cool">${n}(${c})</span>`).join('')}</div></div><div><h3>Thu(${st.wkday.thuN})</h3><div style="display:flex;flex-wrap:wrap;gap:2px">${st.wkday.thursday.map(([n,c])=>`<span class="tag cool">${n}(${c})</span>`).join('')}</div></div></div></div>`;}
  h+=`</div>`;
  const missR=Object.entries(st.miss).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const maxM=Math.max(...missR.map(([,c])=>c));
  h+=`<div class="card"><h3>Most Missed (Recovery)</h3><div class="wave-chart">`;
  missR.forEach(([n,c])=>{const ht=Math.max(5,c/maxM*100);h+=`<div class="wave-bar" style="height:${ht}%;background:linear-gradient(to top,var(--cool),var(--cold))"><span style="font-size:.55rem;position:absolute;bottom:-14px;left:50%;transform:translateX(-50%)">${n}</span></div>`;});
  h+=`</div></div>`;return h;
}

function rCO(scores){
  const c=CFG[gameType],mx=c.max,maxCO=Math.max(...scores.map(s=>Math.abs(s.co)));
  let h=`<div class="card"><h2>CO Bias</h2><div class="wave-chart" style="height:130px;align-items:center">`;
  for(let i=1;i<=mx;i++){const s=scores.find(sc=>sc.num===i),v=s.co,ht=maxCO>0?Math.abs(v)/maxCO*55:0,pos=v>=0,col=pos?'var(--success)':'var(--danger)';
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:center;position:relative">
    <div style="height:${pos?ht:0}%;width:80%;background:${pos?col:'transparent'};border-radius:2px 2px 0 0;min-height:${pos&&ht>0?'2px':'0'}"></div>
    <div style="width:100%;height:1px;background:var(--border)"></div>
    <div style="height:${!pos?ht:0}%;width:80%;background:${!pos?col:'transparent'};border-radius:0 0 2px 2px;min-height:${!pos&&ht>0?'2px':'0'}"></div>
    <span style="font-size:.45rem;color:var(--text-dim);position:absolute;bottom:-12px">${i}</span></div>`;
  }
  h+=`</div></div>`;
  const sorted=[...scores].sort((a,b)=>b.co-a.co);
  h+=`<div class="grid2"><div class="card"><h3>CO Positive</h3>`;
  sorted.slice(0,10).forEach(s=>{h+=`<div class="stat-row"><span class="stat-label">No.${s.num}</span><span class="stat-value" style="color:var(--success)">${s.co>=0?'+':''}${s.co.toFixed(3)}</span></div>`;});
  h+=`</div><div class="card"><h3>CO Negative</h3>`;
  sorted.slice(-10).reverse().forEach(s=>{h+=`<div class="stat-row"><span class="stat-label">No.${s.num}</span><span class="stat-value" style="color:var(--danger)">${s.co.toFixed(3)}</span></div>`;});
  h+=`</div></div>`;return h;
}

initData();
</script>
